<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <filter id="paper">
      <feTurbulence baseFrequency="0.9" numOctaves="3" result="noise" />
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" />
    </filter>
  </defs>
  <rect width="400" height="280" rx="18" ry="18" fill="#f7f0d6" stroke="#b49b6b" stroke-width="6" filter="url(#paper)" />
  <text x="50%" y="40%" font-family="Inter, system-ui" font-size="36" fill="#463322" text-anchor="middle">Aviso</text>
  <text x="50%" y="60%" font-family="Inter, system-ui" font-size="20" fill="#463322" text-anchor="middle">Actividad bandida</text>
</svg>
