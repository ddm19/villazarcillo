<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f2515" />
      <stop offset="100%" stop-color="#231308" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence baseFrequency="0.6" numOctaves="2" result="turb" />
      <feColorMatrix type="saturate" values="0.3" />
      <feBlend in="SourceGraphic" in2="turb" mode="overlay" />
    </filter>
  </defs>
  <rect width="1600" height="1100" rx="48" ry="48" fill="url(#wood)" filter="url(#noise)" />
  <g fill="#00000025">
    <rect x="160" y="120" width="1280" height="860" rx="24" />
    <rect x="160" y="120" width="1280" height="860" rx="24" fill="#fbe9d0" fill-opacity="0.16" />
  </g>
  <text x="50%" y="50%" fill="#f5deb3" opacity="0.6" font-family="Inter, system-ui" font-size="72" text-anchor="middle" dominant-baseline="middle">Tablón Placeholder</text>
</svg>
